<body>
    <!-- Cole aqui TODO o seu HTML original (sidebar, topbar, views, etc.) -->
    <!-- O importante é que o <script> no final esteja adaptado -->

    <script>
        // ==================== CONEXÃO COM SERVIDOR ====================
        const app = {
            currentUser: null,
            db: { users: [], products: [], transactions: [], chats: [] },

            async loadData() {
                try {
                    const res = await fetch('/api/db');
                    this.db = await res.json();
                    console.log("✅ Dados carregados do servidor");
                } catch(e) {
                    console.warn("⚠️ Servidor offline");
                }
            },

            async saveData() {
                try {
                    await fetch('/api/db', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.db)
                    });
                } catch(e) {}
            },

            async init() {
                await this.loadData();
                // Aqui você pode chamar o resto do seu código original
                console.log("App iniciado");
            }
        };

        window.onload = () => app.init();
    </script>
</body>
